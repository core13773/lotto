name: 로또 당첨번호 자동 업데이트
on:
  schedule:
    # 매주 토요일 13:00 UTC (한국 시간 토요일 22:00) — 당첨번호 공개 후 업데이트
    - cron: '0 13 * * 6'
  workflow_dispatch:  # 수동 실행도 가능

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 최신 회차 계산
        id: round
        run: |
          ROUND=$(node -e "
            const first = new Date(Date.UTC(2002, 11, 7, 12, 0, 0));
            const now = new Date();
            const kst = new Date(now.getTime() + 9 * 3600000);
            const dow = kst.getUTCDay();
            const hours = kst.getUTCHours();
            let lastDraw;
            if (dow === 6 && hours >= 21) {
              lastDraw = new Date(Date.UTC(kst.getUTCFullYear(), kst.getUTCMonth(), kst.getUTCDate(), 12, 0, 0));
            } else {
              const daysSinceSat = dow === 6 ? 7 : dow + 1;
              lastDraw = new Date(Date.UTC(kst.getUTCFullYear(), kst.getUTCMonth(), kst.getUTCDate() - daysSinceSat, 12, 0, 0));
            }
            console.log(Math.floor((lastDraw.getTime() - first.getTime()) / (7*24*3600000)) + 1);
          ")
          echo "round=$ROUND" >> "$GITHUB_OUTPUT"
          echo "조회할 회차: $ROUND"

      - name: 네이버 검색 (retry 3회)
        id: naver
        run: |
          ROUND="${{ steps.round.outputs.round }}"
          for i in 1 2 3; do
            echo "네이버 시도 $i..."
            HTTP_CODE=$(curl -sL -w "%{http_code}" -o /tmp/naver.html \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
              -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
              -H "Accept-Language: ko-KR,ko;q=0.9,en-US;q=0.8,en;q=0.7" \
              -H "Referer: https://www.naver.com/" \
              "https://search.naver.com/search.naver?where=nexearch&query=${ROUND}%ED%9A%8C%20%EB%A1%9C%EB%98%90%20%EB%8B%B9%EC%B2%A8%EB%B2%88%ED%98%B8")
            echo "  HTTP $HTTP_CODE, size $(wc -c < /tmp/naver.html)"
            if [ "$HTTP_CODE" = "200" ] && [ -s /tmp/naver.html ]; then
              echo "naver_ok=true" >> "$GITHUB_OUTPUT"
              break
            fi
            echo "  실패, 5초 후 재시도..."
            sleep 5
          done
          if [ "$HTTP_CODE" != "200" ] || [ ! -s /tmp/naver.html ]; then
            echo "naver_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 다음 검색 (fallback)
        id: daum
        if: steps.naver.outputs.naver_ok != 'true'
        run: |
          ROUND="${{ steps.round.outputs.round }}"
          for i in 1 2 3; do
            echo "다음 시도 $i..."
            HTTP_CODE=$(curl -sL -w "%{http_code}" -o /tmp/daum.html \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -H "Accept-Language: ko-KR,ko;q=0.9" \
              "https://search.daum.net/search?w=tot&q=${ROUND}%ED%9A%8C%EB%A1%9C%EB%98%90")
            echo "  HTTP $HTTP_CODE, size $(wc -c < /tmp/daum.html)"
            if [ "$HTTP_CODE" = "200" ] && [ -s /tmp/daum.html ]; then
              echo "daum_ok=true" >> "$GITHUB_OUTPUT"
              break
            fi
            sleep 3
          done
          if [ "$HTTP_CODE" != "200" ] || [ ! -s /tmp/daum.html ]; then
            echo "daum_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 번호 추출 및 저장
        run: |
          cat > /tmp/extract.py << 'PYEOF'
          import re, json, os, sys

          ROUND = int(os.environ.get('ROUND', 0))
          if not ROUND:
              print("ROUND 환경변수가 설정되지 않음")
              sys.exit(1)

          def extract_from_html(path, is_daum=False):
              if not os.path.exists(path) or os.path.getsize(path) == 0:
                  return None
              with open(path, encoding='utf-8', errors='replace') as f:
                  text = re.sub(r'<[^>]+>', ' ', f.read())
                  text = re.sub(r'&\w+;', ' ', text)
                  text = re.sub(r'\s+', ' ', text)
                  text = text.replace('\u2018', "'").replace('\u2019', "'")
              m = re.search(r'(\d{1,2})\s*[,，]\s*(\d{1,2})\s*[,，]\s*(\d{1,2})\s*[,，]\s*(\d{1,2})\s*[,，]\s*(\d{1,2})\s*[,，]\s*(\d{1,2})', text)
              if not m:
                  print(f"  [extract] 6개 번호 매치 실패 (source={'daum' if is_daum else 'naver'})")
                  return None
              nums = [int(m.group(i)) for i in range(1, 7)]
              if not all(1 <= n <= 45 for n in nums) or len(set(nums)) != 6:
                  print(f"  [extract] 번호 범위/중복 오류: {nums}")
                  return None
              bonus = None
              after = text[m.end():m.end() + 500]
              # 다음 특수 형식: 8,9,19,25,41,42번+33번
              if is_daum:
                  bm = re.search(r'번\s*\+\s*(\d{1,2})\s*번', after)
                  if bm:
                      bn = int(bm.group(1))
                      if 1 <= bn <= 45 and bn not in nums:
                          bonus = bn
                          print(f"  [extract] 다음 볼너스 패턴 매치: {bonus}")
              if bonus is None:
                  for pattern in [
                      r'볼너스\s*[:：]?\s*\'?\"?(\d{1,2})\'?\"?',
                      r'bonus\s*[:：]?\s*\'?\"?(\d{1,2})\'?\"?',
                      r'plus\s*[:：]?\s*\'?\"?(\d{1,2})\'?\"?',
                      r'추가\s*[:：]?\s*\'?\"?(\d{1,2})\'?\"?',
                  ]:
                      bm = re.search(pattern, after, re.IGNORECASE)
                      if bm:
                          bn = int(bm.group(1))
                          if 1 <= bn <= 45 and bn not in nums:
                              bonus = bn
                              print(f"  [extract] 볼너스 패턴 매치: {bonus}")
                              break
              return {'round': ROUND, 'numbers': sorted(nums), 'bonus': bonus}

          entry = None
          if os.path.exists('/tmp/naver.html') and os.path.getsize('/tmp/naver.html') > 0:
              entry = extract_from_html('/tmp/naver.html', is_daum=False)

          if entry is None:
              print("네이버 실패, 다음 시도...")
              if os.path.exists('/tmp/daum.html') and os.path.getsize('/tmp/daum.html') > 0:
                  entry = extract_from_html('/tmp/daum.html', is_daum=True)

          if entry is None:
              print("번호를 찾을 수 없음")
              sys.exit(1)

          print(f"추출 성공: {entry}")

          # 기존 데이터 읽고 새 회차 추가
          try:
              with open('latest.json', encoding='utf-8') as f:
                  data = json.load(f)
              if not isinstance(data, list):
                  data = []
          except Exception as e:
              print(f"latest.json 로드 실패: {e}, 빈 배열로 시작")
              data = []

          # 중복 제거 후 추가
          data = [d for d in data if d.get('round') != entry['round']]
          data.append(entry)
          data.sort(key=lambda x: x['round'])

          with open('latest.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          # 경량 브리프 파일 (최근 10회)
          brief = data[-10:]
          with open('latest-brief.json', 'w', encoding='utf-8') as f:
              json.dump(brief, f, ensure_ascii=False, indent=2)

          print(f"저장 완료: 회차 {entry['round']}, {entry['numbers']}, 볼너스: {entry['bonus']}, 총 {len(data)}개 회차")
          PYEOF

          export ROUND="${{ steps.round.outputs.round }}"
          python3 /tmp/extract.py

      - name: 변경사항 커밋
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "lotto-bot"
          git config user.email "bot@example.com"
          git add latest.json latest-brief.json
          git diff --staged --quiet || (git commit -m "최신 당첨번호 업데이트" && git push)
