name: 전체 당첨번호 검증 (GitHub 3중 체크)
on:
  workflow_dispatch:  # 수동 실행만

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: GitHub 3소스에서 전체 데이터 로드 및 교차 검증
        run: |
          cat > /tmp/verify_all.py << 'PYEOF'
          import json, urllib.request, time, sys, os

          # ============================================================
          # GitHub 소스 3곳에서 데이터 로드
          # ============================================================
          sources = {}
          source_names = {}

          # 소스1: jooy34/lotto-history-data
          print("📥 소스1 로드 중: jooy34/lotto-history-data...")
          try:
              req = urllib.request.Request(
                  'https://raw.githubusercontent.com/jooy34/lotto-history-data/main/lotto_draws.json',
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req, timeout=30) as f:
                  raw = json.loads(f.read().decode('utf-8'))
              data1 = {}
              for r in raw:
                  data1[r['drawNo']] = {
                      'round': r['drawNo'],
                      'numbers': sorted(r['numbers']),
                      'bonus': r.get('bonusNumber')
                  }
              sources['jooy34'] = data1
              source_names['jooy34'] = 'jooy34/lotto-history-data'
              print(f"   ✅ {len(data1)}개 회차 로드")
          except Exception as e:
              print(f"   ❌ 로드 실패: {e}")

          # 소스2: devchoo/lotto
          print("📥 소스2 로드 중: devchoo/lotto...")
          try:
              req = urllib.request.Request(
                  'https://raw.githubusercontent.com/devchoo/lotto/main/lotto_data.json',
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req, timeout=30) as f:
                  raw = json.loads(f.read().decode('utf-8'))
              data2 = {}
              for r in raw:
                  data2[r['round']] = {
                      'round': r['round'],
                      'numbers': sorted(r['numbers']),
                      'bonus': None  # 소스2는 보너스 없음
                  }
              sources['devchoo'] = data2
              source_names['devchoo'] = 'devchoo/lotto'
              print(f"   ✅ {len(data2)}개 회차 로드")
          except Exception as e:
              print(f"   ❌ 로드 실패: {e}")

          # 소스3: Utopia-ZEN/hotnumber (최신 회차 번호로 개별 파일 존재 확인)
          print("📥 소스3 로드 중: Utopia-ZEN/hotnumber...")
          try:
              # latest.lotto에서 최신 회차 번호 확인
              req = urllib.request.Request(
                  'https://raw.githubusercontent.com/Utopia-ZEN/hotnumber/main/lotto_data/latest.lotto',
                  headers={'User-Agent': 'Mozilla/5.0'}
              )
              with urllib.request.urlopen(req, timeout=15) as f:
                  latest_round = int(f.read().decode('utf-8').strip())
              print(f"   최신 회차: {latest_round}")

              data3 = {}
              # 각 회차 개별 파일 로드 (1회부터 최신까지)
              for rno in range(1, latest_round + 1):
                  subdir = '1-1000' if rno <= 1000 else '1001-2000'
                  url = f'https://raw.githubusercontent.com/Utopia-ZEN/hotnumber/main/lotto_data/{subdir}/{rno}.lotto'
                  try:
                      req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                      with urllib.request.urlopen(req, timeout=5) as f:
                          d = json.loads(f.read().decode('utf-8'))
                      data3[rno] = {
                          'round': d['round'],
                          'numbers': sorted(d['numbers']),
                          'bonus': d.get('bonus')
                      }
                  except Exception:
                      pass
                  if rno % 200 == 0 or rno == latest_round:
                      print(f"   진행: {rno}/{latest_round} ({len(data3)}개 로드됨)")
                      sys.stdout.flush()
                  time.sleep(0.02)

              sources['hotnumber'] = data3
              source_names['hotnumber'] = 'Utopia-ZEN/hotnumber'
              print(f"   ✅ {len(data3)}개 회차 로드")
          except Exception as e:
              print(f"   ❌ 로드 실패: {e}")

          if not sources:
              print("❌ 모든 소스 로드 실패")
              sys.exit(1)

          # ============================================================
          # 로컬 DB 로드
          # ============================================================
          with open('latest.json', encoding='utf-8') as f:
              data = json.load(f)

          existing = {d['round']: d for d in data}
          max_round = max(existing.keys())
          total = len(existing)

          print(f"\n{'='*60}")
          print(f"  로컬 DB: {total}개 회차 (1 ~ {max_round})")
          print(f"  검증 가능 소스: {len(sources)}개 ({', '.join(source_names.values())})")
          print(f"{'='*60}\n")

          source_keys = list(sources.keys())

          mismatch_nums = []
          mismatch_bonus = []
          updated_bonus = []
          source_fail = []

          for i, round_no in enumerate(range(1, max_round + 1), 1):
              rec = existing.get(round_no)
              if not rec:
                  source_fail.append(round_no)
                  continue

              changes = []

              # 각 소스와 비교
              for sk in source_keys:
                  src_data = sources[sk].get(round_no)
                  if not src_data:
                      continue

                  # 번호 비교
                  if src_data['numbers'] != rec['numbers']:
                      changes.append({
                          'source': sk,
                          'type': 'numbers',
                          'old': rec['numbers'],
                          'new': src_data['numbers'],
                          'round': round_no
                      })

                  # 보너스 비교
                  if src_data.get('bonus') is not None:
                      if rec.get('bonus') is None:
                          changes.append({
                              'source': sk,
                              'type': 'bonus_add',
                              'old': None,
                              'new': src_data['bonus'],
                              'round': round_no
                          })
                      elif rec.get('bonus') != src_data['bonus']:
                          changes.append({
                              'source': sk,
                              'type': 'bonus_mismatch',
                              'old': rec.get('bonus'),
                              'new': src_data['bonus'],
                              'round': round_no
                          })

              if not changes:
                  continue

              # 변경사항 처리 — 다수결 원칙
              num_changes = [c for c in changes if c['type'] == 'numbers']
              bonus_changes = [c for c in changes if c['type'] in ('bonus_add', 'bonus_mismatch')]

              if num_changes:
                  num_votes = {}
                  for c in num_changes:
                      key = ','.join(str(n) for n in c['new'])
                      if key not in num_votes:
                          num_votes[key] = []
                      num_votes[key].append(c)

                  best_nums_key = max(num_votes, key=lambda k: len(num_votes[k]))
                  best_nums_votes = len(num_votes[best_nums_key])

                  # 번호 변경은 최소 2개 소스가 동일한 새 값으로 동의할 때만 반영
                  # (단일 소스 불일치로 기존 교차검증된 데이터가 오염되는 것을 방지)
                  if best_nums_votes >= 2:
                      new_nums = [int(x) for x in best_nums_key.split(',')]
                      if rec['numbers'] != new_nums:
                          old_nums = rec['numbers']
                          rec['numbers'] = new_nums
                          mismatch_nums.append({
                              'round': round_no,
                              'old': old_nums,
                              'new': new_nums,
                              'votes': best_nums_votes
                          })
                          print(f"  [!] {round_no}회 번호 수정: {old_nums} → {new_nums} ({best_nums_votes}개 소스 동의)")

              if bonus_changes:
                  bonus_votes = {}
                  for c in bonus_changes:
                      bk = str(c['new'])
                      if bk not in bonus_votes:
                          bonus_votes[bk] = []
                      bonus_votes[bk].append(c)

                  best_bonus_key = max(bonus_votes, key=lambda k: len(bonus_votes[k]))
                  best_bonus = int(best_bonus_key)
                  best_bonus_votes = len(bonus_votes[best_bonus_key])

                  if rec.get('bonus') is None:
                      rec['bonus'] = best_bonus
                      updated_bonus.append(round_no)
                      if round_no % 50 == 0 or round_no <= 10:
                          print(f"  [>] {round_no}회 보너스 보충: {best_bonus} ({best_bonus_votes}개 소스)")
                  elif rec.get('bonus') != best_bonus and best_bonus_votes >= 2:
                      old_b = rec.get('bonus')
                      rec['bonus'] = best_bonus
                      mismatch_bonus.append({
                          'round': round_no,
                          'old': old_b,
                          'new': best_bonus,
                          'votes': best_bonus_votes
                      })
                      print(f"  [!] {round_no}회 보너스 수정: {old_b} → {best_bonus} ({best_bonus_votes}개 소스 동의)")

              if i % 200 == 0 or i == total:
                  print(f'\r진행: {i}/{total} | 번호수정:{len(mismatch_nums)} | 보너스보충:{len(updated_bonus)} | 보너스수정:{len(mismatch_bonus)}', end='')
                  sys.stdout.flush()

          print('\n\n--- 검증 완료 ---')
          print(f'번호 수정: {len(mismatch_nums)}개')
          for m in mismatch_nums[:20]:
              print(f'  {m["round"]}회: {m["old"]} → {m["new"]} ({m["votes"]}개 소스)')
          if len(mismatch_nums) > 20:
              print(f'  ... 외 {len(mismatch_nums)-20}개')

          print(f'\n보너스 보충: {len(updated_bonus)}개')
          if updated_bonus:
              print(f'  회차: {updated_bonus[:20]}')
              if len(updated_bonus) > 20:
                  print(f'  ... 외 {len(updated_bonus)-20}개')

          print(f'\n보너스 수정: {len(mismatch_bonus)}개')
          for m in mismatch_bonus[:20]:
              print(f'  {m["round"]}회: {m["old"]} → {m["new"]} ({m["votes"]}개 소스)')

          if mismatch_nums or updated_bonus or mismatch_bonus:
              with open('latest.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)

              # 브리프도 업데이트
              brief = data[-10:]
              with open('latest-brief.json', 'w', encoding='utf-8') as f:
                  json.dump(brief, f, ensure_ascii=False, indent=2)

              print('\n변경사항 저장 완료!')
              with open('/tmp/had_changes', 'w') as f:
                  f.write('1')
          else:
              print('\n변경사항 없음.')
              with open('/tmp/had_changes', 'w') as f:
                  f.write('0')
          PYEOF

          python3 /tmp/verify_all.py

      - name: 변경사항 커밋
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/had_changes ] && [ "$(cat /tmp/had_changes)" = "1" ]; then
            git config user.name "lotto-bot"
            git config user.email "bot@example.com"
            git add latest.json latest-brief.json
            git diff --staged --quiet || (git commit -m "fix: 전체 당첨번호 검증 결과 반영 (GitHub 3중 체크)" && git push)
          else
            echo "변경사항 없음, 커밋 생략"
          fi
