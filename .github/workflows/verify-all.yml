name: 전체 당첨번호 검증
on:
  workflow_dispatch:  # 수동 실행만

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 전체 데이터 검증
        run: |
          cat > /tmp/verify.py << 'PYEOF'
          import json, urllib.request, time, sys

          with open('latest.json', encoding='utf-8') as f:
              data = json.load(f)

          existing = {d['round']: d for d in data}
          max_round = max(existing.keys())
          total = len(existing)

          mismatch_nums = []
          mismatch_bonus = []
          updated_bonus = []
          api_fail = []

          print(f'총 {total}개 회차 검증 시작 (1 ~ {max_round})')

          for i, round_no in enumerate(range(1, max_round + 1), 1):
              rec = existing.get(round_no)
              if not rec:
                  api_fail.append(round_no)
                  print(f'  [X] {round_no}회 - 데이터 없음')
                  continue

              url = f'https://www.dhlottery.co.kr/common.do?method=getLottoNumber&drwNo={round_no}'
              req = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                  'Accept': 'application/json, text/javascript, */*',
                  'X-Requested-With': 'XMLHttpRequest',
                  'Referer': 'https://www.dhlottery.co.kr/gameResult.do?method=byWin',
              })

              try:
                  with urllib.request.urlopen(req, timeout=15) as f:
                      resp = json.loads(f.read().decode('utf-8'))
              except Exception as e:
                  api_fail.append(round_no)
                  print(f'  [X] {round_no}회 - API 실패: {e}')
                  continue

              if resp.get('returnValue') != 'success':
                  api_fail.append(round_no)
                  print(f'  [X] {round_no}회 - API 실패: returnValue={resp.get("returnValue")}')
                  continue

              api_nums = sorted([int(resp[f'drwtNo{n}']) for n in range(1, 7)])
              api_bonus = resp.get('bnusNo')
              if api_bonus is not None:
                  api_bonus = int(api_bonus)

              changed = False
              if rec['numbers'] != api_nums:
                  mismatch_nums.append({
                      'round': round_no,
                      'old': rec['numbers'],
                      'new': api_nums
                  })
                  rec['numbers'] = api_nums
                  changed = True

              if api_bonus is not None:
                  if rec.get('bonus') is None:
                      updated_bonus.append(round_no)
                      rec['bonus'] = api_bonus
                      changed = True
                  elif rec.get('bonus') != api_bonus:
                      mismatch_bonus.append({
                          'round': round_no,
                          'old': rec.get('bonus'),
                          'new': api_bonus
                      })
                      rec['bonus'] = api_bonus
                      changed = True

              if changed:
                  tag = 'NUM' if rec['numbers'] != api_nums else 'BONUS'
                  print(f'  [!] {round_no}회 {tag} 수정')

              if i % 100 == 0 or i == total:
                  print(f'\r진행: {i}/{total} | 번호불일치:{len(mismatch_nums)} | 볼너스보충:{len(updated_bonus)} | 볼너스불일치:{len(mismatch_bonus)} | API실패:{len(api_fail)}', end='')
                  sys.stdout.flush()

              time.sleep(0.08)

          print('\n\n--- 검증 완료 ---')
          print(f'번호 불일치: {len(mismatch_nums)}개')
          for m in mismatch_nums:
              print(f'  {m["round"]}회: {m["old"]} -> {m["new"]}')

          print(f'\n볼너스 보충: {len(updated_bonus)}개')
          if updated_bonus:
              print(f'  {updated_bonus}')

          print(f'\n볼너스 불일치(수정): {len(mismatch_bonus)}개')
          for m in mismatch_bonus:
              print(f'  {m["round"]}회: {m["old"]} -> {m["new"]}')

          print(f'\nAPI 실패: {len(api_fail)}개')
          if api_fail:
              print(f'  {api_fail}')

          if mismatch_nums or updated_bonus or mismatch_bonus:
              with open('latest.json', 'w', encoding='utf-8') as f:
                  json.dump(data, f, ensure_ascii=False, indent=2)
              print('\n변경사항 저장 완료!')
              # exit code 0 but signal that there were changes
              with open('/tmp/had_changes', 'w') as f:
                  f.write('1')
          else:
              print('\n변경사항 없음.')
              with open('/tmp/had_changes', 'w') as f:
                  f.write('0')
          PYEOF

          python3 /tmp/verify.py

      - name: 변경사항 커밋
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/had_changes ] && [ "$(cat /tmp/had_changes)" = "1" ]; then
            git config user.name "lotto-bot"
            git config user.email "bot@example.com"
            git add latest.json
            git diff --staged --quiet || (git commit -m "fix: 전체 당첨번호 검증 결과 반영" && git push)
          else
            echo "변경사항 없음, 커밋 생략"
          fi
